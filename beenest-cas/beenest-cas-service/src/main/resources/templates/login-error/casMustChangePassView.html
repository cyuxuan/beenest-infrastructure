<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title>Beenest SSO - 修改密码</title>
  <script th:inline="javascript">
    /*<![CDATA[*/
    var pmPolicyPattern = /*[[${passwordPolicyPattern}]]*/ '';
    /*]]>*/
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var pwdEl = document.getElementById('password');
      var confirmEl = document.getElementById('confirmedPassword');
      var strengthBar = document.getElementById('strengthBar');
      var strengthFill = document.getElementById('strengthFill');
      var strengthLabel = document.getElementById('strengthLabel');
      var mismatchMsg = document.getElementById('mismatchMsg');
      var policyMsg = document.getElementById('policyMsg');
      var submitBtn = document.getElementById('submitBtn');
      var form = document.getElementById('passwordManagementForm');

      if (!pwdEl || !confirmEl) return;

      // 密码可见切换
      document.querySelectorAll('.cas-pm-toggle').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var targetId = this.getAttribute('data-target');
          var input = document.getElementById(targetId);
          if (input) input.type = input.type === 'password' ? 'text' : 'password';
        });
      });

      pwdEl.addEventListener('input', function() {
        var pwd = this.value;
        if (!pwd) { strengthBar.style.display = 'none'; updateBtn(); return; }
        strengthBar.style.display = 'flex';

        var score = 0;
        if (pwd.length >= 8) score++;
        if (pwd.length >= 12) score++;
        if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
        if (/\d/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        if (score > 4) score = 4;

        var colors = ['#ef4444', '#f59e0b', '#eab308', '#22c55e'];
        var labels = ['极弱', '弱', '一般', '强', '极强'];
        var widths = ['20%', '40%', '60%', '80%', '100%'];

        strengthFill.style.width = widths[score];
        strengthFill.style.background = colors[Math.min(score, 3)];
        strengthLabel.textContent = labels[score];
        strengthLabel.style.color = colors[Math.min(score, 3)];

        // 校验策略
        if (pmPolicyPattern) {
          try {
            policyMsg.style.display = new RegExp(pmPolicyPattern).test(pwd) ? 'none' : 'flex';
          } catch(e) {}
        }
        checkMatch();
      });

      confirmEl.addEventListener('input', checkMatch);

      function checkMatch() {
        var pwd = pwdEl.value;
        var confirm = confirmEl.value;
        if (confirm) {
          mismatchMsg.style.display = (pwd !== confirm) ? 'flex' : 'none';
        } else {
          mismatchMsg.style.display = 'none';
        }
        updateBtn();
      }

      function updateBtn() {
        var pwd = pwdEl.value;
        var confirm = confirmEl.value;
        var policyOk = !policyMsg || policyMsg.style.display === 'none';
        var matchOk = pwd === confirm;
        submitBtn.disabled = !(pwd && confirm && matchOk && policyOk);
      }

      if (form) {
        form.addEventListener('submit', function(e) {
          var pwd = pwdEl.value;
          var confirm = confirmEl.value;
          if (pwd !== confirm) { e.preventDefault(); return; }
          if (pmPolicyPattern) {
            try { if (!new RegExp(pmPolicyPattern).test(pwd)) { e.preventDefault(); return; } } catch(ex) {}
          }
        });
      }

      // 初始状态
      updateBtn();
    });
  </script>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card cas-pm-card">
      <!-- 标题区 -->
      <div class="cas-status-icon cas-status-icon--accent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <h2 class="cas-pm-title">修改密码</h2>
      <p class="cas-status-text">请设置符合安全要求的新密码以继续使用。</p>
      <div class="cas-pm-policy">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
        <span>密码要求：至少 12 位，须包含大写字母、小写字母、数字和特殊字符</span>
      </div>

      <!-- 密码修改表单 -->
      <form id="passwordManagementForm" th:if="${passwordManagementEnabled}" method="post"
            th:object="${password}" class="cas-pm-form">

        <!-- 错误消息 -->
        <div class="cas-pm-alert" th:if="${#fields.hasErrors('*')}" role="alert">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
          <span th:each="err : ${#fields.errors('*')}" th:utext="${err + ' '}"></span>
        </div>

        <!-- 当前密码 -->
        <div class="cas-pm-field" th:if="${activeFlowId} == 'login'">
          <input type="password" id="currentPassword" name="currentPassword"
                 th:field="*{currentPassword}"
                 autocomplete="off" required placeholder=" " />
          <label for="currentPassword">当前密码</label>
        </div>

        <!-- 新密码 -->
        <div class="cas-pm-field">
          <input type="password" id="password" name="password"
                 th:field="*{password}"
                 autocomplete="off" required placeholder=" " />
          <label for="password">新密码</label>
          <button type="button" class="cas-pm-toggle" data-target="password" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <!-- 密码强度指示器 -->
        <div class="cas-pm-strength" id="strengthBar" style="display:none">
          <div class="cas-pm-strength-track">
            <div class="cas-pm-strength-fill" id="strengthFill"></div>
          </div>
          <span class="cas-pm-strength-label" id="strengthLabel"></span>
        </div>

        <!-- 确认新密码 -->
        <div class="cas-pm-field">
          <input type="password" id="confirmedPassword" name="confirmedPassword"
                 th:field="*{confirmedPassword}"
                 autocomplete="off" required placeholder=" " />
          <label for="confirmedPassword">确认新密码</label>
          <button type="button" class="cas-pm-toggle" data-target="confirmedPassword" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <!-- 密码不匹配提示 -->
        <div class="cas-pm-warn" id="mismatchMsg" style="display:none">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
          <span>两次输入的密码不一致</span>
        </div>

        <!-- 策略不匹配提示 -->
        <div class="cas-pm-warn" id="policyMsg" style="display:none">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
          <span>密码不符合安全策略要求</span>
        </div>

        <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
        <input type="hidden" name="_eventId" value="submit"/>

        <div class="cas-pm-actions">
          <button type="submit" class="cas-btn cas-btn-primary" id="submitBtn" disabled>提交修改</button>
          <a th:href="@{/login}" class="cas-btn cas-btn-outline">取消</a>
        </div>
      </form>

      <p th:unless="${passwordManagementEnabled}" class="cas-status-text">
        密码管理功能未启用，请联系管理员修改密码。
      </p>
    </div>
  </div>
</body>

</html>
