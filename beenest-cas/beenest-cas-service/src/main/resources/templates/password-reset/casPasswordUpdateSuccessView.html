<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>密码修改成功</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card" style="text-align: center;">
            <h2>密码修改成功</h2>
            <p>你的密码已成功更新。请使用新密码重新登录。</p>

            <div class="cas-btn-group" style="justify-content: center; margin-top: 1.5rem;">
                <a th:href="@{/login}" class="cas-btn cas-btn-primary">重新登录</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
