<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title th:text="#{cas.mfa.googleauth.pagetitle}">Beenest SSO - Google 验证器</title>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card" style="max-width: 32rem; margin: 0 auto;">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="font-size: 3rem; margin-bottom: 0.5rem; color: var(--accent);">
          <span class="mdi mdi-shield-key-outline"></span>
        </div>
        <h2>多因素认证</h2>
        <p style="color: var(--muted);">请输入您的 Google 验证器动态验证码</p>
      </div>

      <p th:if="${registeredDevice}" th:utext="#{screen.authentication.gauth.selecteddevice(${registeredDevice.name})}"
         style="color: var(--muted); text-align: center; margin-bottom: 1rem;">
        已选择设备
      </p>

      <form method="post" id="fm1" th:object="${credential}" th:action="@{/login}">
        <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
          <p th:each="err : ${#fields.errors('*')}" th:utext="${err + ' '}">Error</p>
        </div>

        <input type="hidden" name="_eventId" value="submit" />
        <input type="hidden" name="execution" th:value="${flowExecutionKey}" />
        <input type="hidden" name="geolocation" />

        <div class="field-group" style="margin-bottom: 1.5rem;">
          <label for="token">验证码</label>
          <input type="text" id="token" name="token" autocomplete="off"
                 placeholder="请输入 6 位验证码"
                 style="text-align: center; font-size: 1.4rem; letter-spacing: 0.5em;"
                 required />
        </div>

        <input type="hidden" id="accountId" name="accountId" th:field="*{accountId}" />

        <script th:inline="javascript">
          /*<![CDATA[*/
          var accountId = /*[[${registeredDevice.id}]]*/ '';
          document.getElementById("accountId").value = accountId;
          /*]]>*/
        </script>

        <div class="cas-btn-group" style="justify-content: center;">
          <button type="submit" class="cas-btn cas-btn-primary" id="loginButton">
            验证并登录
          </button>
          <a class="cas-btn cas-btn-outline" id="cancel" name="cancel"
             onclick="location.href = location.href;">
            取消
          </a>
        </div>
      </form>

      <div th:if="${registeredDevices}" style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--line);">
        <p th:utext="#{screen.authentication.gauth.selanotherdevice(${registeredDevice.name})}"
           style="color: var(--muted); font-size: 0.88rem; text-align: center;">
          切换设备
        </p>
        <form method="post" id="fm3" style="text-align: center;">
          <input type="hidden" name="_eventId" value="select" />
          <input type="hidden" name="execution" th:value="${flowExecutionKey}" />
          <button type="submit" class="cas-btn cas-btn-outline" id="selectDeviceButton">
            选择其他设备
          </button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
