        password: ENC(57lDt6VMKxg541ABg9p19nQ3FG+BfI5XcI3FT1QFG3UZj1Mz29AW0uYjd2GaUuGD)
        dialect: org.hibernate.dialect.PostgreSQLDialect
        password-encoder:
          type: BCRYPT
          strength: 12
        sql-change-password: "UPDATE cas_user SET password_hash=?, password_changed_time=NOW(), must_change_password=false WHERE username=? AND status=1"
        sql-find-email: "SELECT email FROM cas_user WHERE username=? AND status=1"
        sql-find-phone: "SELECT phone FROM cas_user WHERE username=? AND status=1"
        sql-find-user: "SELECT username FROM cas_user WHERE email=? AND status=1"
        sql-unlock-account: "UPDATE cas_user SET failed_login_count=0, lock_until_time=NULL WHERE username=?"
