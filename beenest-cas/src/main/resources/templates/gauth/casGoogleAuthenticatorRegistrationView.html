<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>MFA 设备注册</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card">
            <h2>注册认证器设备</h2>
            <p>使用 Google Authenticator 或兼容应用扫描下方二维码完成注册。</p>

            <div th:if="${key}" style="text-align: center; margin: 1.5rem 0;">
                <div style="display: inline-block; padding: 1rem; background: white; border-radius: 1rem;">
                    <img th:src="'data:image/png;base64,' + ${qrCodeBase64}" alt="TOTP QR Code"
                         style="width: 200px; height: 200px;"/>
                </div>
                <p style="margin-top: 1rem; color: var(--muted);">
                    密钥: <code th:text="${key}">SECRET_KEY</code>
                </p>
            </div>

            <form method="post" id="fm1" th:action="@{/login}">
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                <input type="hidden" name="_eventId" value="submit"/>

                <div class="alert alert-danger" id="errorPanel" style="display: none;" role="alert">
                    <p th:utext="#{screen.authentication.gauth.invalidtoken}">验证码无效</p>
                </div>

                <section>
                    <label for="token">输入验证码确认注册</label>
                    <input type="text" name="token" id="token" autocomplete="one-time-code"
                           inputmode="numeric" pattern="[0-9]*" placeholder="输入 6 位验证码" required/>
                </section>

                <div class="cas-btn-group">
                    <button type="submit" class="cas-btn cas-btn-primary" id="verifyButton">确认注册</button>
                    <button type="button" class="cas-btn cas-btn-outline" onclick="history.back()">取消</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
