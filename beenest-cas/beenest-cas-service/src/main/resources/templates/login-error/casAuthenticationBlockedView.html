<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title th:text="#{screen.authnblocked.heading}">Beenest SSO - 认证被阻止</title>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card" style="text-align: center; max-width: 36rem; margin: 0 auto;">
      <div style="font-size: 3rem; margin-bottom: 1rem; color: var(--danger);">
        <span class="mdi mdi-shield-lock-outline"></span>
      </div>
      <h2 th:utext="#{screen.authnblocked.heading}">认证被阻止</h2>
      <p style="color: var(--muted);" th:utext="#{screen.authnblocked.message}">
        您当前的认证请求未被授权。
      </p>
      <div class="cas-btn-group" style="justify-content: center; margin-top: 1.5rem;">
        <a th:href="@{/login}" class="cas-btn cas-btn-primary">返回登录</a>
      </div>
    </div>
  </div>
</body>

</html>
