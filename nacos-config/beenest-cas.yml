        driver-class: org.postgresql.Driver
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:beenest}?currentSchema=beenest_cas
        user: ${DB_USER:postgres}
        password: ENC(57lDt6VMKxg541ABg9p19nQ3FG+BfI5XcI3FT1QFG3UZj1Mz29AW0uYjd2GaUuGD)
        dialect: org.hibernate.dialect.PostgreSQLDialect
        sql: SELECT password_hash FROM cas_user WHERE username=? AND status=1
        field-password: password_hash
        password-encoder:
          type: BCRYPT
          strength: 12
        pool:
          maximum-lifetime: PT30M
    throttle:
      core:
        username-parameter: ${CAS_AUTHN_THROTTLE_USERNAME_PARAMETER:username}
      failure:
