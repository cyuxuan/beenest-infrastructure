        entity-id: ${CAS_SAML_IDP_ENTITY_ID:${cas.server.name}/cas/idp}
      metadata:
        file-system:
          location: file:/etc/cas/saml
    oauth:
      access-token:
        time-to-kill-in-seconds: 7200
      refresh-token:
        time-to-kill-in-seconds: 2592000
    oidc:
      core:
        issuer: ${CAS_OIDC_ISSUER:${cas.server.name}/cas/oidc}
      jwks:
        file-system:
          jwks-file: file:/etc/cas/oidc/jwks.json
