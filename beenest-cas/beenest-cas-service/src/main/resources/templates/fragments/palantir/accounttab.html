<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
</head>
<body>
<span th:fragment="main">
<div id="accountTabPanel" class="d-none">
    <div class="pal-tab-header">
        <h3>用户管理</h3>
        <button id="addUserBtn" class="pal-btn pal-btn-primary" onclick="showAddUserDialog()">
            <i class="mdi mdi-account-plus"></i>添加用户
        </button>
    </div>
    <div class="pal-toolbar">
        <input type="text" id="userSearchInput" placeholder="搜索用户名、昵称、手机号、邮箱..."
               oninput="loadUsers(0)" class="pal-search-input"/>
        <select id="userStatusFilter" onchange="loadUsers(0)" class="pal-select">
            <option value="">全部状态</option>
            <option value="1">正常</option>
            <option value="2">锁定</option>
            <option value="3">禁用</option>
        </select>
    </div>
    <div id="userListContainer" class="pal-table-container">
        <table class="pal-table">
            <thead>
                <tr>
                    <th>用户ID</th>
                    <th>用户名</th>
                    <th>昵称</th>
                    <th>手机号</th>
                    <th>邮箱</th>
                    <th>类型</th>
                    <th>状态</th>
                    <th>角色</th>
                    <th>最后登录</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userListBody"></tbody>
        </table>
    </div>
    <div id="userPagination" class="pal-pagination"></div>

    <!-- 添加用户对话框 -->
    <div id="addUserDialog" class="pal-dialog d-none">
        <div class="pal-dialog-overlay" onclick="hideAddUserDialog()"></div>
        <div class="pal-dialog-content">
            <h4>添加用户</h4>
            <div class="pal-form-group">
                <label>用户名</label>
                <input type="text" id="addUsername" class="pal-input" required/>
            </div>
            <div class="pal-form-group">
                <label>邮箱</label>
                <input type="email" id="addEmail" class="pal-input"/>
            </div>
            <div class="pal-form-group">
                <label>手机号</label>
                <input type="tel" id="addPhone" class="pal-input"/>
            </div>
            <div class="pal-form-group">
                <label>角色</label>
                <input type="text" id="addRoles" class="pal-input" placeholder="如 ROLE_DRONE_SYSTEM"/>
            </div>
            <div class="pal-dialog-actions">
                <button class="pal-btn pal-btn-primary" onclick="submitInvitation()">创建用户</button>
                <button class="pal-btn" onclick="hideAddUserDialog()">取消</button>
            </div>
            <div id="addUserResult" class="pal-result-msg d-none"></div>
        </div>
    </div>
</div>
</span>
</body>
</html>
