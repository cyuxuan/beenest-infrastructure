<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="#{cas.mfa.googleauth.pagetitle}">MFA 验证</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card">
            <h2>双因素认证</h2>
            <p th:if="${registeredDevice}" th:utext="#{screen.authentication.gauth.selecteddevice(${registeredDevice.name})}">
                使用已注册设备进行验证
            </p>

            <form method="post" id="fm1" th:object="${credential}" th:action="@{/login}">
                <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
                    <span th:each="err : ${#fields.errors('*')}" th:utext="${err + ' '}"/>
                </div>

                <input type="hidden" name="_eventId" value="submit"/>
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                <input type="hidden" name="geolocation"/>
                <input type="hidden" id="accountId" name="accountId" th:field="*{accountId}"/>

                <script th:inline="javascript">
                    /*<![CDATA[*/ document.getElementById("accountId").value = /*[[${registeredDevice.id}]]*/ ''; /*]]>*/
                </script>

                <section>
                    <label for="token" th:utext="#{cas.mfa.googleauth.label.token}">验证码</label>
                    <input type="text" name="token" id="token" th:field="*{token}"
                           autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*"
                           placeholder="输入 6 位验证码" required/>
                </section>

                <div class="cas-btn-group" style="margin-top: 1.5rem;">
                    <button type="submit" class="cas-btn cas-btn-primary" id="loginButton"
                            th:text="#{screen.welcome.button.login}">验证</button>
                    <button type="button" class="cas-btn cas-btn-outline" id="cancel"
                            onclick="location.href = location.href;"
                            th:utext="#{screen.authentication.gauth.cancel}">取消</button>
                </div>
            </form>

            <div th:if="${registeredDevices}">
                <hr/>
                <p th:utext="#{screen.authentication.gauth.selanotherdevice(${registeredDevice.name})}">选择其他设备</p>
                <form method="post" id="fm3">
                    <input type="hidden" name="_eventId" value="select"/>
                    <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                    <button type="submit" class="cas-btn cas-btn-outline"
                            th:text="#{screen.authentication.gauth.selectdevice}">选择设备</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
