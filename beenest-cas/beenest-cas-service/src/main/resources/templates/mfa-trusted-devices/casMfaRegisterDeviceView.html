<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>注册受信设备</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card">
            <h2>注册受信设备</h2>
            <p>将当前设备标记为受信任，后续登录此设备可跳过双因素验证。</p>

            <div class="alert alert-warning">
                <p>仅在个人设备上启用此选项。公共设备不应标记为受信任。</p>
            </div>

            <form method="post" id="fm1" th:action="@{/login}">
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                <input type="hidden" name="_eventId" value="submit"/>

                <section>
                    <label for="deviceName">设备名称</label>
                    <input type="text" id="deviceName" name="deviceName"
                           placeholder="例如: 我的 iPhone 16" required/>
                </section>

                <div style="margin-top: 0.5rem;">
                    <label class="cas-radio-option" style="cursor: pointer;">
                        <input type="checkbox" name="registerDevice" id="registerDevice" value="true"/>
                        <div>
                            <div class="radio-label">信任此设备</div>
                            <div class="radio-desc">在设备有效期内的后续登录将跳过 MFA 验证</div>
                        </div>
                    </label>
                </div>

                <div class="cas-btn-group" style="margin-top: 1.5rem;">
                    <button type="submit" class="cas-btn cas-btn-primary">确认注册</button>
                    <button type="button" class="cas-btn cas-btn-outline" onclick="history.back()">跳过</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
