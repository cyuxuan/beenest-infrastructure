# ============================================================
# Apereo CAS 7.3.x 主配置
# ============================================================

cas:
  server:
    name: https://sso.beenest.club
    prefix: ${cas.server.name}/cas

  # TGC Cookie 配置
  tgc:
    crypto:
      encryption:
        key: ${TGC_ENCRYPTION_KEY:changeme-changeme-changeme}
      signing:
        key: ${TGC_SIGNING_KEY:changeme-changeme-changeme-changeme-changeme-changeme-changeme}
    path: /cas
    http-only: true
    secure: true

  # 票据注册表: Redis
  ticket:
    registry:
      redis:
        host: ${REDIS_HOST:localhost}
        port: ${REDIS_PORT:6379}
        password: ${REDIS_PASSWORD:}
        database: 1
        pool:
          enabled: true
          max-active: 20
          max-idle: 10
        # 票据加密密钥（必须固定，否则重启后无法解密已有 TGT）
        crypto:
          encryption:
            key: ${TICKET_ENCRYPTION_KEY:changeme-changeme-changeme}
          signing:
            key: ${TICKET_SIGNING_KEY:changeme-changeme-changeme-changeme-changeme-changeme-changeme}
    # 追踪子票据，确保登出时能一并清理 descendant tickets
    track-descendant-tickets: true
    # TGT 配置
    tgt:
      primary:
        time-to-kill-in-seconds: 7200
      remember-me:
        enabled: true
        time-to-kill-in-seconds: 2592000
    # ST 配置
    st:
      time-to-kill-in-seconds: 10
      number-of-uses: 1

  # 服务注册: JPA (PostgreSQL)
  service-registry:
    jpa:
      driver-class: org.postgresql.Driver
      url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
      user: ${DB_USER:postgres}
      password: ${DB_PASSWORD:changeme}
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: update

  # SLO 配置
  logout:
    follow-service-redirects: true

  # Inspektr 审计（替代自定义 AuthAuditService）
  audit:
    jdbc:
      driver-class: org.postgresql.Driver
      url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
      user: ${DB_USER:postgres}
      password: ${DB_PASSWORD:changeme}
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: update
      audit-column-length: 5000
      max-age-days: 180

  # CAS 事件持久化
  events:
    jpa:
      driver-class: org.postgresql.Driver
      url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
      user: ${DB_USER:postgres}
      password: ${DB_PASSWORD:changeme}
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: update

  # 验证码（登录/注册防机器人，默认关闭，需配置 reCAPTCHA/hCaptcha 密钥后启用）
  captcha:
    core:
      enabled: ${CAPTCHA_ENABLED:false}
      provider: RECAPTCHA
    recaptcha:
      site-key: ${RECAPTCHA_SITE_KEY:}
      secret-key: ${RECAPTCHA_SECRET_KEY:}
      verify-url: https://www.google.com/recaptcha/api/siteverify

  # 认证中断（强制改密/公告/合规提醒）
  interrupt:
    core:
      enabled: true
      trigger-mode: AFTER
    groovy:
      location: classpath:interrupt.groovy

  # ===== SAML2 IdP =====
  authn:
    saml-idp:
      core:
        entity-id: https://sso.beenest.club/cas/idp
        metadata:
          location: file:/etc/cas/saml
      metadata:
        jpa:
          driver-class: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
          user: ${DB_USER:postgres}
          password: ${DB_PASSWORD:changeme}
          dialect: org.hibernate.dialect.PostgreSQLDialect
          ddl-auto: update
      response:
        sign-error: true
        sign-responses: true
        sign-assertions: true

    # ===== OAuth2 / OIDC =====
    oauth:
      access-token:
        time-to-kill-in-seconds: 7200
      refresh-token:
        time-to-kill-in-seconds: 2592000
    oidc:
      core:
        issuer: https://sso.beenest.club/cas/oidc
        scopes:
          - openid
          - profile
          - email
          - phone
          - offline_access
      jwks:
        jwks-file: file:/etc/cas/oidc/jwks.json
      crypto:
        signing:
          key: ${OIDC_SIGNING_KEY:changeme-changeme-changeme-changeme-changeme-changeme-changeme}
        encryption:
          key: ${OIDC_ENCRYPTION_KEY:changeme-changeme-changeme}

    # ===== WS-Federation =====
    wsfed-idp:
      idp:
        realm: urn:org:apereo:cas:ws:idp:realm-beenest
        realm-name: Beenest
      sts:
        realm:
          issuer: https://sso.beenest.club/cas/wsfed
        crypto:
          encryption:
            key: ${WSFED_ENCRYPTION_KEY:changeme-changeme-changeme}
          signing:
            key: ${WSFED_SIGNING_KEY:changeme-changeme-changeme-changeme-changeme-changeme-changeme}

    # ===== 密码管理 =====
    pm:
      enabled: true
      jdbc:
        driver-class: org.postgresql.Driver
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
        user: ${DB_USER:postgres}
        password: ${DB_PASSWORD:changeme}
        dialect: org.hibernate.dialect.PostgreSQLDialect
        ddl-auto: update
      password-encoder:
        type: BCRYPT
        strength: 12
      history:
        enabled: true
        max-passwords-to-keep: 6
      reset:
        enabled: true
        security-questions-enabled: false

    # ===== JDBC 用户名密码认证 =====
    jdbc:
      query[0]:
        driver-class: org.postgresql.Driver
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
        user: ${DB_USER:postgres}
        password: ${DB_PASSWORD:changeme}
        dialect: org.hibernate.dialect.PostgreSQLDialect
        sql: SELECT password_hash FROM cas_user WHERE username=? AND status=1
        field-password: password_hash
        password-encoder:
          type: BCRYPT
          strength: 12

    # ===== MFA: Google Authenticator =====
    mfa:
      gauth:
        core:
          window-size: 3
          time-step-size: 30
          codes: 6
          scratch-codes:
            count: 5
            length: 8
        jpa:
          driver-class: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
          user: ${DB_USER:postgres}
          password: ${DB_PASSWORD:changeme}
          dialect: org.hibernate.dialect.PostgreSQLDialect
          ddl-auto: update
      # ===== MFA: WebAuthn (FIDO2) =====
      webauthn:
        core:
          relying-party-name: Beenest CAS
          relying-party-id: sso.beenest.club
          allow-primary-authentication: false
        jpa:
          driver-class: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
          user: ${DB_USER:postgres}
          password: ${DB_PASSWORD:changeme}
          dialect: org.hibernate.dialect.PostgreSQLDialect
          ddl-auto: update
      # 信任设备（跳过 MFA）
      trusted:
        core:
          enabled: true
          device-registration-enabled: true
        jdbc:
          driver-class: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
          user: ${DB_USER:postgres}
          password: ${DB_PASSWORD:changeme}
          dialect: org.hibernate.dialect.PostgreSQLDialect
          ddl-auto: update
      # 全局 MFA 触发策略
      triggers:
        global:
          global-provider-id: mfa-gauth

    # ===== 模拟/代理认证 (Surrogate) =====
    surrogate:
      jdbc:
        driver-class: org.postgresql.Driver
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
        user: ${DB_USER:postgres}
        password: ${DB_PASSWORD:changeme}
        dialect: org.hibernate.dialect.PostgreSQLDialect
        ddl-auto: update
        sql-surrogate-accounts-to-search: SELECT surrogate_user FROM cas_surrogate WHERE principal=?

    # ===== 委托认证 (Pac4j - 社交登录) =====
    pac4j:
      core:
        enabled: true
      wechat[0]:
        id: ${WECHAT_WEB_APPID:}
        secret: ${WECHAT_WEB_SECRET:}
      google[0]:
        id: ${GOOGLE_CLIENT_ID:}
        secret: ${GOOGLE_CLIENT_SECRET:}

  # ===== 用户同意 (Consent) =====
  consent:
    core:
      enabled: true
    jdbc:
      driver-class: org.postgresql.Driver
      url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
      user: ${DB_USER:postgres}
      password: ${DB_PASSWORD:changeme}
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: update

  # ===== 使用条款 (AUP) =====
  acceptable-usage-policy:
    core:
      enabled: true
    jdbc:
      driver-class: org.postgresql.Driver
      url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
      user: ${DB_USER:postgres}
      password: ${DB_PASSWORD:changeme}
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: update

    # ===== JWT 认证 =====
    jwt:
      core:
        enabled: true
      crypto:
        signing:
          key: ${JWT_SIGNING_KEY:changeme-changeme-changeme-changeme-changeme-changeme-changeme}
        encryption:
          key: ${JWT_ENCRYPTION_KEY:changeme-changeme-changeme}

    # ===== QR Code 扫码登录 =====
    qr:
      core:
        enabled: true
        ttl: 300
        qr-size: 256
        verify-url: ${cas.server.prefix}/qr/verify

    # ===== 无密码认证 (Passwordless) =====
    passwordless:
      core:
        enabled: true
        token-expire-seconds: 300
        multiple-token-usage: false
      groovy:
        location: classpath:passwordlessUserStore.groovy

    # ===== 认证节流/防暴力破解 =====
    throttle:
      core:
        enabled: true
        failure-threshold: 5
        failure-range-in-seconds: 300
        username-parameter: username
      redis:
        host: ${REDIS_HOST:localhost}
        port: ${REDIS_PORT:6379}
        password: ${REDIS_PASSWORD:}

    # ===== 自适应风险认证 (Electrofence) =====
    adaptive:
      core:
        enabled: true
        risk-threshold: 0.6
      geo:
        enabled: true
        provider: ip
      policy:
        block-attempt: true
        trigger-mfa: true
        log-event: true

  # ===== WebSocket (QR Code 扫码依赖) =====
  websocket:
    core:
      enabled: true
      endpoint: /cas/websocket

# ============================================================
# Spring Boot 配置
# ============================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/beenest?currentSchema=beenest_cas
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
  # Palantir Admin Dashboard 认证
  security:
    user:
      name: ${PALANTIR_ADMIN_USER:admin}
      password: ${PALANTIR_ADMIN_PASSWORD:}
      roles: ADMIN
  # 邮件通知（CAS 密码重置、通知等功能依赖）
  mail:
    host: ${MAIL_HOST:smtp.beenest.club}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# ============================================================
# 业务自定义配置
# ============================================================
beenest:
  token:
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL:604800}       # 7 天
    refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL:31536000}   # 365 天（1 年）
    refresh-token-rotation: true
    validation-secret: ${CAS_TOKEN_VALIDATION_SECRET:}
  miniapp:
    wechat:
      appid: ${WECHAT_APPID:}
      secret: ${WECHAT_SECRET:}
    douyin:
      appid: ${DOUYIN_APPID:}
      secret: ${DOUYIN_SECRET:}
    alipay:
      appid: ${ALIPAY_APPID:}
      private-key: ${ALIPAY_PRIVATE_KEY:}
      public-key: ${ALIPAY_PUBLIC_KEY:}
      # AES 内容加密密钥（用于手机号解密，在支付宝开放平台配置）
      aes-key: ${ALIPAY_AES_KEY:}
  sms:
    provider: ${SMS_PROVIDER:aliyun}
    access-key: ${SMS_ACCESS_KEY:}
    secret-key: ${SMS_SECRET_KEY:}
    sign-name: ${SMS_SIGN_NAME:Beenest}
    template-code: ${SMS_TEMPLATE_CODE:}
  user:
    auto-grant-service-ids: ${BEENEST_AUTO_GRANT_SERVICE_IDS:10001}
  mfa:
    encryption-key: ${MFA_ENCRYPTION_KEY:changeme-changeme-changeme}
  # Admin API 认证 Token（生产环境必须配置，否则管理接口无法访问）
  admin:
    token: ${CAS_ADMIN_TOKEN:}
  # 用户同步 API 签名密钥
  sync:
    sign-key: ${CAS_SYNC_SIGN_KEY:}

# ============================================================
# Actuator 端点（Palantir 依赖）
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: when-authorized
    env:
      enabled: true
    info:
      enabled: true
    ssoSessions:
      enabled: true
