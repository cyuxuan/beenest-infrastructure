<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="#{screen.risk.authnblocked.heading}">认证被阻止</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card" style="text-align: center;">
            <h2 style="color: var(--danger);" th:utext="#{screen.risk.authnblocked.heading}">认证被阻止</h2>
            <p th:utext="#{screen.risk.authnblocked.message}">
                当前登录请求被风险评估系统拦截。请从受信任的设备或网络重试。
            </p>
            <div class="cas-btn-group" style="justify-content: center;">
                <a th:href="@{/login}" class="cas-btn cas-btn-outline">返回登录</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
