<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="#{screen.logout.header}">登出成功</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card" style="text-align: center;">
            <h2 th:utext="#{screen.logout.header}">登出成功</h2>
            <p id="logoutMessage" th:with="loginUrl=@{/login}"
               th:utext="#{screen.logout.success(${loginUrl})}">
                你已成功登出统一认证中心。你可以 <a th:href="@{/login}">重新登录</a>。
            </p>
            <p th:utext="#{screen.logout.security}">为了安全，请关闭浏览器。</p>

            <div th:if="${enableProceed}">
                <p style="color: var(--muted);">正在继续登出流程，请稍候...</p>
                <form method="post" id="logoutform" th:action="@{/logout}">
                    <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                    <input type="hidden" name="_eventId" value="proceed"/>
                </form>
                <script>setTimeout(() => document.getElementById('logoutform')?.submit(), 1000);</script>
            </div>

            <div th:unless="${enableProceed}" style="margin-top: 1.5rem;">
                <a th:href="@{/login}" class="cas-btn cas-btn-primary">重新登录</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
