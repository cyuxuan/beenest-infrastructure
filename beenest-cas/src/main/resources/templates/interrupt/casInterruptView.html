<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="#{screen.interrupt.title}">通知</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card">
            <h2 th:text="${interruptMessage?.title ?: '重要通知'}">重要通知</h2>

            <div th:if="${interruptMessage?.message}">
                <p th:utext="${interruptMessage.message}">通知内容</p>
            </div>

            <div th:if="${interruptMessage?.links}">
                <div th:each="link : ${interruptMessage.links}" style="margin: 0.5rem 0;">
                    <a th:href="${link.href}" th:text="${link.text}" class="cas-btn cas-btn-outline" style="font-size: 0.88rem;">链接</a>
                </div>
            </div>

            <form method="post" id="fm1" th:action="@{/login}">
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                <input type="hidden" name="_eventId" value="proceed"/>

                <div class="cas-btn-group" style="margin-top: 1.5rem;">
                    <button type="submit" class="cas-btn cas-btn-primary" id="proceed">继续</button>
                    <a th:href="@{/logout}" class="cas-btn cas-btn-outline">取消并登出</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
