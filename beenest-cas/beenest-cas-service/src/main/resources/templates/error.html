<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title th:text="#{screen.unavailable.header}">Beenest SSO - 错误</title>
  <script th:inline="javascript">
    /*<![CDATA[*/
    function showErrorDetails() {
      var errorTrace = ""; // /*[[${#strings.escapeXml(trace)}]]*/ ;
      document.getElementById("errorMsg").style.display = "none";
      var details = document.getElementById("errorDetails");
      var pre = document.createElement("pre");
      pre.className = "cas-error-box";
      pre.textContent = errorTrace;
      details.textContent = "";
      details.appendChild(pre);
    }
    /*]]>*/
  </script>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card cas-status-card">
      <div class="cas-status-icon cas-status-icon--danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h2 th:utext="#{screen.unavailable.heading(${status},${error})}">请求处理失败</h2>
      <p class="cas-status-text" th:utext="#{screen.unavailable.message}">服务暂时不可用，请稍后重试。</p>
      <pre id="errorMsg" class="cas-error-box" th:text="${'Error: ' + message}">Error message</pre>
      <p id="errorDetails" th:if="${trace}">
        <button type="button" class="cas-btn cas-btn-outline" onclick="showErrorDetails();"
                style="font-size: 0.8rem; min-height: 2rem; padding: 0 1rem;">查看详情</button>
      </p>
      <div class="cas-status-actions">
        <a th:href="@{/login}" class="cas-btn cas-btn-primary">返回登录</a>
      </div>
    </div>
  </div>
</body>

</html>
