<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" th:lang="${#strings.replace(#locale.toString(), '_', '-')}" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title layout:title-pattern="$LAYOUT_TITLE — $CONTENT_TITLE"
           th:text="${#strings.defaultString(#cas.theme('cas.theme.name'), 'Beenest CAS')}">Beenest CAS</title>
    <link rel="stylesheet" th:href="@{/css/beenest-login.css}"/>
    <link rel="shortcut icon" th:href="@{${#strings.defaultString(#cas.theme('cas.favicon.file'), '/favicon.ico')}}"/>
</head>
<body class="beenest-cas">

<header class="beenest-cas-header">
    <a class="brand-mark" th:href="@{/login}">
        <span class="brand-dot"></span>
        <span class="brand-name">Beenest CAS</span>
    </a>
    <span style="color: var(--muted); font-size: 0.78rem; letter-spacing: 0.14em;" th:text="#{cas.login.pagetitle}">统一认证中心</span>
</header>

<main class="beenest-cas-main">
    <section class="management-menu" th:if="${managementMenuItems != null}">
        <style>
            .management-menu {
                margin: 0 0 1.25rem 0;
                padding: 1rem 1.1rem;
                border-radius: 18px;
                background: rgba(255, 255, 255, 0.84);
                border: 1px solid rgba(17, 24, 39, 0.08);
                box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
            }

            .management-menu__title {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: .75rem;
                margin-bottom: .9rem;
            }

            .management-menu__title h2 {
                margin: 0;
                font-size: 1rem;
                color: #111827;
            }

            .management-menu__title span {
                color: var(--muted);
                font-size: .78rem;
            }

            .management-menu__grid {
                display: grid;
                gap: .75rem;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            }

            .management-menu__item {
                display: block;
                padding: .85rem .95rem;
                border-radius: 14px;
                border: 1px solid rgba(17, 24, 39, 0.08);
                background: rgba(248, 250, 252, 0.96);
                color: inherit;
                text-decoration: none;
                transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
            }

            .management-menu__item:hover {
                transform: translateY(-1px);
                box-shadow: 0 8px 20px rgba(15, 23, 42, 0.07);
                border-color: rgba(29, 78, 216, 0.28);
            }

            .management-menu__item.is-active {
                border-color: rgba(29, 78, 216, 0.5);
                background: rgba(239, 246, 255, 0.96);
            }

            .management-menu__item strong {
                display: block;
                color: #111827;
                margin-bottom: .2rem;
            }

            .management-menu__item p {
                margin: 0;
                color: #5b6472;
                font-size: .82rem;
            }
        </style>
        <div class="management-menu__title">
            <h2>管理菜单</h2>
            <span th:text="${managementMenuTitle != null ? managementMenuTitle : '同应用管理入口'}">同应用管理入口</span>
        </div>
        <nav class="management-menu__grid" aria-label="管理菜单">
            <a class="management-menu__item"
               th:each="item : ${managementMenuItems}"
               th:href="${item.href}"
               th:classappend="${item.active ? ' is-active' : ''}">
                <strong th:text="${item.label}">菜单项</strong>
                <p th:text="${item.description}">描述</p>
            </a>
        </nav>
    </section>
    <div layout:fragment="content" id="content">
        CAS content will go here
    </div>
</main>

<footer class="beenest-cas-footer">
    <span th:text="'&copy; ' + ${#temporals.format(#temporals.createNow(), 'yyyy')} + ' Beenest'">&copy; 2026 Beenest</span>
    &nbsp;&middot;&nbsp;
    <a th:href="@{/login}" th:text="#{screen.welcome.button.login}">登录</a>
</footer>

<script th:replace="~{fragments/scripts}"></script>

</body>
</html>
