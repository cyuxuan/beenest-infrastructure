<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title>Beenest SSO - WebAuthn 认证</title>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card" style="max-width: 32rem; margin: 0 auto;">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="font-size: 3rem; margin-bottom: 0.5rem; color: var(--accent);">
          <span class="mdi mdi-fingerprint"></span>
        </div>
        <h2>FIDO2 / WebAuthn 认证</h2>
        <p style="color: var(--muted);">请使用安全密钥或生物识别进行认证</p>
      </div>

      <div id="webAuthnLoginPanel">
        <div th:replace="~{fragments/webAuthnLogin :: webAuthnLogin}" />
      </div>

      <div class="cas-btn-group" style="justify-content: center; margin-top: 1.5rem;">
        <a th:href="@{/login}" class="cas-btn cas-btn-outline">使用其他方式登录</a>
      </div>
    </div>
  </div>
</body>

</html>
