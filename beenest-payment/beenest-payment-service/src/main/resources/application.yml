# ============================================================
# Payment 主配置 — 框架级基础设施（跨环境不变）
# 业务配置（cas client / payment / withdraw）→ application-secret.yml
# 环境差异化配置 → application-{profile}.yml
# ============================================================

server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: beenest-payment
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    include:
      - secret
  main:
    allow-bean-definition-overriding: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import:
      - optional:nacos:beenest-payment.yml?refreshEnabled=true&group=DEFAULT_GROUP
      - optional:nacos:beenest-payment-${spring.profiles.active}.yml?refreshEnabled=true&group=DEFAULT_GROUP
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yml
        fail-fast: false
        refresh-enabled: true
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        enabled: ${NACOS_ENABLED:true}
        network-interface: ${NETWORK_INTERFACE:}
        # 直接指定注册 IP（优先级最高，解决 IPv6 地址注册问题）
        ip: ${NACOS_DISCOVERY_IP:}
        # 强制使用 IPv4 注册，避免注册 IPv6 地址导致服务间调用失败
        ip-type: IPv4
    inetutils:
      # 优先使用 IPv4 网段（匹配 10.88.x.x 等 WireGuard/内网地址）
      preferred-networks: 10.,172.,192.168.,127.
      # 忽略 macOS 虚拟网卡和 VPN 隧道（wt0 是 WireGuard 业务网卡，不能忽略）
      ignored-interfaces: utun.,awdl.,bridge.,llw.,anpi.,lo0
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8080}
        port: ${SENTINEL_PORT:8720}
      eager: true
    openfeign:
      sentinel:
        enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  cache:
    type: redis
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: postgresql
  reasonable: true

logging:
  level:
    club.beenest.payment: INFO
    club.beenest.payment.mapper: INFO

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
