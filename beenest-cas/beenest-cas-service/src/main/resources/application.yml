# ============================================================
# CAS 本地兜底配置
# 全量配置已迁移到 Nacos 配置中心（data-id: beenest-cas.yml）
# 此文件仅在 Nacos 不可用时作为兜底，生产环境不应依赖此文件。
# ============================================================

server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: beenest-cas
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    allow-bean-definition-overriding: true

# 本地开发兜底日志级别
logging:
  level:
    org.apereo.cas: INFO
    org.apereo.cas.beenest: INFO
