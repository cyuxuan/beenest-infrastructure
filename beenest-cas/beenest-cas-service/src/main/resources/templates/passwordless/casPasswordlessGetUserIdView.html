<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>无密码登录</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card" style="text-align: center;">
            <h2>无密码登录</h2>
            <p>输入用户名，我们将通过已绑定的方式发送登录链接。</p>

            <form method="post" id="fm1" th:object="${credential}" th:action="@{/login}">
                <input type="hidden" name="_eventId" value="submit"/>
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>

                <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
                    <span th:each="err : ${#fields.errors('*')}" th:utext="${err + ' '}"/>
                </div>

                <section style="text-align: left; max-width: 24rem; margin: 0 auto;">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" th:field="*{username}"
                           autocomplete="username" placeholder="请输入用户名" required/>
                </section>

                <div class="cas-btn-group" style="justify-content: center; margin-top: 1.5rem;">
                    <button type="submit" class="cas-btn cas-btn-primary">发送登录链接</button>
                    <a th:href="@{/login}" class="cas-btn cas-btn-outline">返回登录</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
