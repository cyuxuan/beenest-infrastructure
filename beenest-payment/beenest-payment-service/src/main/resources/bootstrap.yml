# ============================================================
# Payment Bootstrap 配置 — Nacos 配置中心连接信息
# 此文件在 Spring Boot 启动的 bootstrap 阶段加载，
# 早于 application.yml，用于建立与 Nacos 的连接并拉取远程配置。
# ============================================================

spring:
  application:
    name: beenest-payment
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yml
        # 指定网卡，避免多网卡环境下连接 Nacos 使用错误的 IP
        network-interface: ${NETWORK_INTERFACE:}
        # Nacos 不可用时不阻止启动（本地开发兜底）
        fail-fast: false
        # 开启配置自动刷新：@ConfigurationProperties Bean 通过 ConfigurationPropertiesRebinder 自动重新绑定；
        # @Value 注入的 Bean 需标注 @RefreshScope 才会刷新。CAS 框架内部 Bean（cas.*）不支持刷新。
        refresh-enabled: true
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        enabled: ${NACOS_ENABLED:true}
        # 指定网卡，避免多网卡环境下注册错误的 IP
        network-interface: ${NETWORK_INTERFACE:}
