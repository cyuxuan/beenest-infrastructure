<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
</head>
<body>
<span th:fragment="main">
    <div class="attribute-tab w-100 d-none" id="attribute-tab-13">

        <div class="jqueryui-tabs">
            <ul>
                <li><a id="mfaDevicesTab" href="#mfadevices-tab">多因素身份认证设备</a></li>
                <li><a id="trustedMfaDevicesTab" href="#trustedmfadevices-tab">受信任多因素身份认证设备</a></li>
            </ul>
            <div id="mfadevices-tab">
                <p>您可以查看指定用户已注册的多因素身份认证设备。</p>
                <form id="fmMfaDevices" class="d-block" onsubmit="return false;">
                    <section class="cas-field form-group my-3 mdc-input-group d-flex">
                        <div class="mdc-input-group-field mdc-input-group-field-append w-100">
                            <label for="mfaUsername"
                                   class="mdc-text-field mdc-text-field--outlined control-label mdc-text-field--with-trailing-icon mb-2">
                                <span class="mdc-notched-outline">
                                    <span class="mdc-notched-outline__leading"></span>
                                    <span class="mdc-notched-outline__notch">
                                        <span class="mdc-floating-label">用户名</span>
                                    </span>
                                    <span class="mdc-notched-outline__trailing"></span>
                                </span>
                                <input class="mdc-text-field__input form-control" type="text"
                                       name="mfaUsername" data-param-name="username" tabindex="0" id="mfaUsername" size="50" autocomplete="off" required/>
                            </label>
                        </div>

                    </section>
                    <div class="d-flex">
                        <button type="button" name="mfaDevicesButton" id="mfaDevicesButton"
                                class="mdc-button mdc-button--raised">
                            <span class="mdc-button__label"><i class="mdc-tab__icon mdi mdi-magnify" aria-hidden="true"></i>搜索</span>
                        </button>
                    </div>

                </form>

                <table id="mfaDevicesTable" class="mdc-data-table__table table table-striped noborder">
                    <thead>
                    <tr class="mdc-data-table__header-row">
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">名称</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">类型</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">ID</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">编号</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">型号</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">上次使用</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">到期时间</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">来源</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">载荷</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col"></th>
                    </tr>
                    </thead>
                    <tbody class="mdc-data-table__content">
                    </tbody>
                </table>
            </div>
            <div id="trustedmfadevices-tab">
                <p>您可以查看指定用户已注册的受信任多因素身份认证设备。</p>
                <form id="fmTrustedMfaDevices" class="d-block" onsubmit="return false;">
                    <section class="cas-field form-group my-3 mdc-input-group d-flex">
                        <div class="mdc-input-group-field mdc-input-group-field-append w-100">
                            <label for="mfaTrustedUsername"
                                   class="mdc-text-field mdc-text-field--outlined control-label mdc-text-field--with-trailing-icon mb-2">
                                <span class="mdc-notched-outline">
                                    <span class="mdc-notched-outline__leading"></span>
                                    <span class="mdc-notched-outline__notch">
                                        <span class="mdc-floating-label">用户名</span>
                                    </span>
                                    <span class="mdc-notched-outline__trailing"></span>
                                </span>
                                <input class="mdc-text-field__input form-control" type="text"
                                       name="mfaTrustedUsername" data-param-name="username" tabindex="0"
                                       id="mfaTrustedUsername" size="50" autocomplete="off" required/>
                            </label>
                        </div>

                    </section>
                    <div class="d-flex">
                        <button type="button" name="mfaTrustedDevicesButton" id="mfaTrustedDevicesButton"
                                class="mdc-button mdc-button--raised">
                            <span class="mdc-button__label"><i class="mdc-tab__icon mdi mdi-magnify" aria-hidden="true"></i>搜索</span>
                        </button>
                    </div>

                </form>

                <table id="mfaTrustedDevicesTable" class="mdc-data-table__table table table-striped noborder">
                    <thead>
                    <tr class="mdc-data-table__header-row">
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">ID</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">主体</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">设备指纹</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">日期</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">名称</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">到期时间</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">多因素提供方</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">密钥</th>
                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col"></th>
                    </tr>
                    </thead>
                    <tbody class="mdc-data-table__content">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</span>
</body>
</html>
