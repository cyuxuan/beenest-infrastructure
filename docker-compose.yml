services:
  # ======================== 中间件 ========================

  postgres:
    image: imresamu/postgis-arm64:16-3.4-alpine
    container_name: beenest-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # 初始化脚本：创建数据库 + schema
      # schema 列表：drone_system, beenest_payment, beenest_cas
      - ./infra/postgres/00-create-databases.sh:/docker-entrypoint-initdb.d/00-create-databases.sh
      - ./infra/postgres/01-schema-drone-system.sql:/tmp/sql/01-schema-drone-system.sql
      - ./infra/postgres/02-schema-beenest-payment.sql:/tmp/sql/02-schema-beenest-payment.sql
      - ./infra/postgres/03-schema-beenest-cas.sql:/tmp/sql/03-schema-beenest-cas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beenest-net

  redis:
    image: redis:7-alpine
    container_name: beenest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beenest-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: drone-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - beenest-net

  minio:
    image: minio/minio:latest
    container_name: beenest-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beenest-net

  nacos:
    image: nacos/nacos-server:v2.4.3-slim
    container_name: beenest-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - beenest-net

  # ======================== 基础服务 ========================

  # ---------- CAS 统一认证中心（端口 8081） ----------
  beenest-cas:
    image: eclipse-temurin:21-jre-jammy
    container_name: beenest-cas
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./beenest-cas/.env
    ports:
      - "8081:8081"
    volumes:
      - ./beenest-cas/beenest-cas-service/build/libs/cas.war:/app/app.war
      - ./beenest-cas/beenest-cas-service/etc/cas/oidc/jwks.json:/etc/cas/oidc/jwks.json:ro
      - ./beenest-cas/beenest-cas-service/etc/cas/saml:/etc/cas/saml
      - beenest-cas-logs:/app/logs
    working_dir: /app
    entrypoint: ["sh", "-c", "java $$JAVA_OPTS -jar /app/app.war"]
    networks:
      - beenest-net

  # ---------- 支付微服务（端口 8082） ----------
  beenest-payment:
    image: eclipse-temurin:21-jre-jammy
    container_name: beenest-payment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    env_file:
      - ./beenest-payment/.env
    ports:
      - "8082:8082"
    volumes:
      - ./beenest-payment/beenest-payment-service/target/beenest-payment-service-0.0.1-SNAPSHOT.jar:/app/app.jar
      - beenest-payment-logs:/app/logs
    working_dir: /app
    entrypoint: ["sh", "-c", "java $$JAVA_OPTS -jar /app/app.jar"]
    networks:
      - beenest-net

networks:
  beenest-net:
    external: true

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  nacos-data:
  beenest-cas-logs:
  beenest-payment-logs:
