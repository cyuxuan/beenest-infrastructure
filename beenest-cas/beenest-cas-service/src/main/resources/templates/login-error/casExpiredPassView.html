<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title>Beenest SSO - 密码已过期</title>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card" style="text-align: center; max-width: 36rem; margin: 0 auto;">
      <div style="font-size: 3rem; margin-bottom: 1rem; color: var(--warning);">
        <span class="mdi mdi-clock-alert-outline"></span>
      </div>
      <h2>密码已过期</h2>
      <p style="color: var(--muted);">
        您的密码已过期，请修改密码后继续。
      </p>
      <div class="cas-btn-group" style="justify-content: center; margin-top: 1.5rem;">
        <a class="cas-btn cas-btn-primary" id="changePasswordLink"
           onclick="location.href = location.href;">修改密码</a>
        <a th:href="@{/login}" class="cas-btn cas-btn-outline">返回登录</a>
      </div>
    </div>
  </div>
</body>

</html>
