<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title th:text="#{screen.pm.reset.title}">Beenest SSO - 重置密码</title>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card" style="max-width: 32rem; margin: 0 auto;">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="font-size: 3rem; margin-bottom: 0.5rem; color: var(--accent);">
          <span class="mdi mdi-key-variant"></span>
        </div>
        <h2 th:utext="#{screen.pm.reset.title}">重置密码</h2>
        <p style="color: var(--muted);" th:utext="#{screen.pm.reset.instructions}">
          请输入您的用户名，您将收到密码重置指引。
        </p>
      </div>

      <form method="post" id="fm1" class="login-form">
        <div class="alert alert-danger"
             th:if="${flowRequestContext.messageContext.hasErrorMessages()}">
          <p th:each="message,i : ${flowRequestContext.messageContext.allMessages}"
             th:utext="${message.text}" th:classappend="${i.last} ? 'm-0'">
            Error
          </p>
        </div>

        <span th:if="${recaptchaPasswordManagementEnabled}">
          <div th:replace="~{fragments/recaptcha :: recaptchaToken}" />
        </span>

        <input type="hidden" name="execution" th:value="${flowExecutionKey}" />
        <input type="hidden" name="_eventId" value="findAccount" />

        <div class="field-group" style="margin-bottom: 1.5rem;">
          <label for="username">用户名</label>
          <input type="text" name="username" id="username" size="45"
                 autocapitalize="none" spellcheck="false"
                 autocomplete="username" required
                 placeholder="请输入您的用户名" />
        </div>

        <div class="cas-btn-group" style="justify-content: center;">
          <button type="submit" class="cas-btn cas-btn-primary"
                  th:text="#{screen.pm.button.submit}">提交</button>
          <button type="button" class="cas-btn cas-btn-outline" name="cancel"
                  onclick="location.href = location.href;"
                  th:text="#{screen.pm.button.cancel}">取消</button>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
