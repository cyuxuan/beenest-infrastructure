<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="#{cas.login.pagetitle}">Beenest CAS 登录</title>
    <link rel="stylesheet" th:href="@{/css/beenest-login.css}"/>
</head>
<body class="beenest-login">
<main class="login-shell">
    <section class="login-hero" aria-hidden="true">
        <div class="brand-mark">
            <span class="brand-dot"></span>
            <span class="brand-name">Beenest CAS</span>
        </div>

        <div class="hero-copy">
            <p class="eyebrow">Unified Authentication</p>
            <h1>被信任的统一登录入口。</h1>
            <p class="lede">基于 CAS Webflow + Thymeleaf 渲染，只保留用户名密码与短信验证码。</p>
        </div>

        <div class="hero-notes">
            <div>
                <span>认证方式</span>
                <strong>用户名密码 / 短信验证码</strong>
            </div>
            <div>
                <span>数据层</span>
                <strong>PostgreSQL + Redis</strong>
            </div>
            <div>
                <span>服务能力</span>
                <strong>统一认证与后台管理</strong>
            </div>
        </div>
    </section>

    <section class="login-panel">
        <div class="panel-card" th:with="loginFormEnabled=${#cas.isTrue(#cas.theme('cas.login-form.enabled'))},
                                         loginFormViewable=${#cas.isLoginFormViewable(#vars)}">
            <div class="panel-header">
                <p class="panel-kicker">Sign in</p>
                <h2 th:text="${existingSingleSignOnSessionAvailable} ? '已检测到会话' : '欢迎回来'">欢迎回来</h2>
                <p class="panel-desc" th:text="${existingSingleSignOnSessionAvailable} ? '你可以直接继续访问，也可以切换账号。' : '请输入账号信息完成统一认证。'">
                    请输入账号信息完成统一认证。
                </p>
            </div>

            <div class="alert alert-warning" th:if="${authenticationException != null}" role="alert">
                <p th:text="${authenticationException.message != null ? authenticationException.message : '认证失败，请重试。'}">
                    认证失败，请重试。
                </p>
            </div>

            <div class="alert alert-warning" th:if="${existingSingleSignOnSessionAvailable}">
                <p th:if="${registeredService}"
                   th:text="${'当前会话来自 ' + existingSingleSignOnSessionPrincipal?.id + '，目标应用为 ' + registeredService.name}">
                    当前会话已存在。
                </p>
                <p th:unless="${registeredService}"
                   th:text="${'当前会话来自 ' + existingSingleSignOnSessionPrincipal?.id}">
                    当前会话已存在。
                </p>
            </div>

            <form id="fm1" class="login-form" method="post" th:if="${loginFormViewable and loginFormEnabled}"
                  th:action="@{/login}" th:object="${credential}" autocomplete="off">
                <input type="hidden" id="loginMethod" name="loginMethod"
                       th:value="${param.loginMethod != null ? param.loginMethod[0] : 'password'}"/>
                <input type="hidden" id="service" name="service"
                       th:value="${registeredService != null ? registeredService.id : param.service}"/>
                <input type="hidden" name="lt" th:value="${loginTicket}"/>
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                <input type="hidden" name="_eventId" value="submit"/>
                <input type="hidden" name="geolocation" value=""/>

                <section class="mode-switch" aria-label="登录方式">
                    <button type="button" class="mode-button is-active" data-mode="password" aria-pressed="true">用户名密码</button>
                    <button type="button" class="mode-button" data-mode="sms" aria-pressed="false">短信验证码</button>
                </section>

                <p class="mode-hint">Web 登录仅支持用户名密码和短信验证码两种方式。</p>

                <section class="field-group">
                    <label for="loginPrincipal" id="primaryLabel">用户名</label>
                    <input id="loginPrincipal" type="text" th:field="*{username}" autocomplete="username" required
                           placeholder="请输入用户名"/>
                </section>

                <section class="field-group password-group">
                    <label for="loginSecret" id="secondaryLabel">密码</label>
                    <input id="loginSecret" type="password" th:field="*{password}" autocomplete="current-password" required
                           placeholder="请输入密码"/>
                </section>

                <div class="sms-actions">
                    <button type="button" class="secondary-button sms-send-button" data-send-sms>发送验证码</button>
                </div>

                <section class="switch-row">
                    <label class="switch" th:if="${#cas.isTrue(#cas.theme('cas.warn-on-redirect.enabled'))}">
                        <input type="checkbox" id="warn" name="warn"/>
                        <span>跳转前提示</span>
                    </label>
                    <label class="switch" th:if="${#cas.isTrue(#cas.theme('cas.public-workstation.enabled'))}">
                        <input type="checkbox" id="publicWorkstation" name="publicWorkstation"/>
                        <span>公共终端</span>
                    </label>
                    <label class="switch" th:if="${rememberMeAuthenticationEnabled}">
                        <input type="checkbox" id="rememberMe" name="rememberMe"/>
                        <span>记住登录状态</span>
                    </label>
                </section>

                <div th:if="${recaptchaSiteKey}" class="g-recaptcha" th:attr="data-sitekey=${recaptchaSiteKey}" data-theme="dark" style="margin-top: 0.2rem;"></div>

                <button type="submit" class="submit-button">
                    <span class="submit-label">进入系统</span>
                    <span class="submit-hint">CAS / beenest routing</span>
                </button>
            </form>

            <div class="fallback-panel" th:unless="${loginFormViewable and loginFormEnabled}">
                <p>当前登录表单不可用，请联系管理员检查 CAS 配置。</p>
            </div>
        </div>
    </section>
</main>

<script>
  (() => {
    const form = document.getElementById('fm1');
    if (!form) return;
    const submit = form.querySelector('button[type="submit"]');
    const loginMethod = document.getElementById('loginMethod');
    const primaryInput = document.getElementById('loginPrincipal');
    const secondaryInput = document.getElementById('loginSecret');
    const primaryLabel = document.getElementById('primaryLabel');
    const secondaryLabel = document.getElementById('secondaryLabel');
    const modeButtons = Array.from(document.querySelectorAll('.mode-button'));
    const smsSendButton = document.querySelector('[data-send-sms]');
    const modes = {
      password: {
        loginMethod: 'password',
        primaryLabel: '用户名',
        secondaryLabel: '密码',
        primaryPlaceholder: '请输入用户名',
        secondaryPlaceholder: '请输入密码',
        secondaryType: 'password',
        primaryAutocomplete: 'username',
        secondaryAutocomplete: 'current-password',
      },
      sms: {
        loginMethod: 'sms',
        primaryLabel: '手机号',
        secondaryLabel: '短信验证码',
        primaryPlaceholder: '请输入手机号',
        secondaryPlaceholder: '请输入验证码',
        secondaryType: 'text',
        primaryAutocomplete: 'tel',
        secondaryAutocomplete: 'one-time-code',
      },
    };

    const applyMode = (mode) => {
      const config = modes[mode] || modes.password;
      if (loginMethod) loginMethod.value = config.loginMethod;
      if (primaryLabel) primaryLabel.textContent = config.primaryLabel;
      if (secondaryLabel) secondaryLabel.textContent = config.secondaryLabel;
      if (primaryInput) {
        primaryInput.placeholder = config.primaryPlaceholder;
        primaryInput.autocomplete = config.primaryAutocomplete;
      }
      if (secondaryInput) {
        secondaryInput.type = config.secondaryType;
        secondaryInput.placeholder = config.secondaryPlaceholder;
        secondaryInput.autocomplete = config.secondaryAutocomplete;
      }
      modeButtons.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.mode === mode);
        button.setAttribute('aria-pressed', String(button.dataset.mode === mode));
      });
      if (smsSendButton) {
        smsSendButton.disabled = mode !== 'sms';
      }
    };

    modeButtons.forEach((button) => {
      button.addEventListener('click', () => applyMode(button.dataset.mode));
    });

    if (smsSendButton) {
      smsSendButton.addEventListener('click', async () => {
        const phoneValue = primaryInput ? primaryInput.value.trim() : '';
        const mode = loginMethod ? loginMethod.value : 'password';
        if (mode !== 'sms') {
          return;
        }
        if (!phoneValue) {
          alert('请先输入手机号');
          return;
        }
        smsSendButton.disabled = true;
        const originalText = smsSendButton.textContent;
        smsSendButton.textContent = '发送中...';
        try {
          const resp = await fetch(`/cas/sms/send?phone=${encodeURIComponent(phoneValue)}`, {
            credentials: 'same-origin',
          });
          if (!resp.ok) {
            const text = await resp.text();
            throw new Error(text || '发送失败');
          }
          smsSendButton.textContent = '已发送';
        } catch (error) {
          alert('验证码发送失败，请稍后重试');
          smsSendButton.textContent = originalText;
        } finally {
          setTimeout(() => {
            smsSendButton.disabled = false;
            smsSendButton.textContent = originalText;
          }, 1500);
        }
      });
    }

    applyMode(loginMethod && loginMethod.value ? loginMethod.value : 'password');

    form.addEventListener('submit', () => {
      if (!submit) return;
      submit.disabled = true;
      submit.classList.add('is-loading');
      const label = submit.querySelector('.submit-label');
      if (label) label.textContent = '认证中...';
    });
  })();
</script>
</body>
</html>
