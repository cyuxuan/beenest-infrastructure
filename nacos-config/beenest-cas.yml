    pm:
      core:
        enabled: true
        auto-login: false
        password-policy-pattern: "${CAS_PM_PASSWORD_POLICY_PATTERN:^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[^A-Za-z0-9]).{12,128}$}"
      webflow:
        enabled: true
      history:
        core:
          enabled: true
      jdbc:
        driver-class: org.postgresql.Driver
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:beenest}?currentSchema=beenest_cas
