services:
  # ======================== 中间件 ========================

  postgres:
    image: imresamu/postgis-arm64:16-3.4-alpine
    container_name: beenest-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # 初始化脚本：创建数据库 + schema
      # schema 列表：drone_system, beenest_payment, beenest_cas
      - ./infra/postgres/00-create-databases.sh:/docker-entrypoint-initdb.d/00-create-databases.sh
      - ./infra/postgres/01-schema-drone-system.sql:/tmp/sql/01-schema-drone-system.sql
      - ./infra/postgres/02-schema-beenest-payment.sql:/tmp/sql/02-schema-beenest-payment.sql
      - ./infra/postgres/03-schema-beenest-cas.sql:/tmp/sql/03-schema-beenest-cas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beenest-net

  redis:
    image: redis:7-alpine
    container_name: beenest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beenest-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: drone-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - beenest-net

  minio:
    image: minio/minio:latest
    container_name: beenest-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beenest-net

  nacos:
    image: nacos/nacos-server:v2.4.3-slim
    container_name: beenest-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - beenest-net

  # ======================== 基础服务 ========================

  # ---------- CAS 统一认证中心（端口 8081） ----------
  beenest-cas:
    image: eclipse-temurin:21-jre-jammy
    container_name: beenest-cas
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # 数据源（beenest 数据库，beenest_cas schema）
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/beenest?currentSchema=beenest_cas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      # Redis（database 1，用于 CAS ticket registry）
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 覆盖 CAS service-registry JPA 数据源
      CAS_SERVICE_REGISTRY_JPA_URL: jdbc:postgresql://postgres:5432/beenest?currentSchema=beenest_cas
      CAS_SERVICE_REGISTRY_JPA_USER: postgres
      CAS_SERVICE_REGISTRY_JPA_PASSWORD: postgres
      # 覆盖 Redis 配置
      CAS_TICKET_REGISTRY_REDIS_HOST: redis
      CAS_TICKET_REGISTRY_REDIS_PORT: 6379
      # CAS TGC Cookie 加密密钥（生产环境请通过 .env 覆盖）
      TGC_ENCRYPTION_KEY: ${TGC_ENCRYPTION_KEY:-Qo8XK0iRv7EGqRrjzlZHm5QTLQZuGPX2qAfeYvqbWa0=}
      TGC_SIGNING_KEY: ${TGC_SIGNING_KEY:-qxsVEn/IcKgVrlszWN+fpyL79lMuHIVXNeoI30wifmhEMrCdZ1zSZV9LvCWtkI+C80zDc4hJRZ8BIfJxZaxvtQ==}
      CAS_WEBFLOW_ENCRYPTION_KEY: ${CAS_WEBFLOW_ENCRYPTION_KEY:-OEg1eFZVNjl5QjdjMjVweQ==}
      CAS_WEBFLOW_SIGNING_KEY: ${CAS_WEBFLOW_SIGNING_KEY:-XUc7LyOkxkus/L02JHeP/RsnvUVo1dr7SbvINlfxPgjpWke9sBFdm2Ji30UpZOJfNA1Cnep1iax5HLJ98pAZBw==}
      MANAGEMENT_ENDPOINT_CASFEATURES_ACCESS: ${MANAGEMENT_ENDPOINT_CASFEATURES_ACCESS:-UNRESTRICTED}
      MANAGEMENT_ENDPOINT_REGISTEREDSERVICES_ACCESS: ${MANAGEMENT_ENDPOINT_REGISTEREDSERVICES_ACCESS:-UNRESTRICTED}
      # CAS 企业能力开关
      CAS_FEATURE_THROTTLING_ENABLED: ${CAS_FEATURE_THROTTLING_ENABLED:-true}
      CAS_FEATURE_CONSENT_ENABLED: ${CAS_FEATURE_CONSENT_ENABLED:-false}
      CAS_FEATURE_AUP_ENABLED: ${CAS_FEATURE_AUP_ENABLED:-false}
      CAS_FEATURE_LDAP_AUTH_ENABLED: ${CAS_FEATURE_LDAP_AUTH_ENABLED:-false}
      CAS_AUTHN_ACCEPT_ENABLED: ${CAS_AUTHN_ACCEPT_ENABLED:-false}
      CAS_AUTHN_ACCEPT_USERS: ${CAS_AUTHN_ACCEPT_USERS:-}
      # 登录限流参数
      CAS_AUTHN_THROTTLE_FAILURE_THRESHOLD: ${CAS_AUTHN_THROTTLE_FAILURE_THRESHOLD:-5}
      CAS_AUTHN_THROTTLE_FAILURE_RANGE_SECONDS: ${CAS_AUTHN_THROTTLE_FAILURE_RANGE_SECONDS:-300}
      CAS_AUTHN_THROTTLE_FAILURE_WINDOW: ${CAS_AUTHN_THROTTLE_FAILURE_WINDOW:-PT10M}
      CAS_AUTHN_THROTTLE_JDBC_ENABLED: ${CAS_AUTHN_THROTTLE_JDBC_ENABLED:-true}
      CAS_TICKET_REGISTRY_REDIS_CRYPTO_ENABLED: ${CAS_TICKET_REGISTRY_REDIS_CRYPTO_ENABLED:-true}
      # 票据注册表加密密钥（生产环境请通过 .env 覆盖，且必须固定，否则重启后无法解密已有 TGT）
      TICKET_ENCRYPTION_KEY: ${TICKET_ENCRYPTION_KEY:-wkBxd7mNJygX7zm6jtgX4g==}
      TICKET_SIGNING_KEY: ${TICKET_SIGNING_KEY:-RjZ4rbzh2/HNjSCbS0HbjSZtDakIGDPoiK7a4xmTnXZefRjCnQnNZ61r8koY6AVmVJ9jRU8fbtRqzmcHR+mPRw==}
      CAS_AUTHN_MFA_GAUTH_CRYPTO_ENCRYPTION_KEY: ${CAS_AUTHN_MFA_GAUTH_CRYPTO_ENCRYPTION_KEY:-c_WZINuoQusJtcbfjexjw5NA8x0w98DtyIaY1JafAJ0oP8UTQzaytF10sK1FVyPvKXxNFepFEzl0dSZy33rFFQ}
      CAS_AUTHN_MFA_GAUTH_CRYPTO_SIGNING_KEY: ${CAS_AUTHN_MFA_GAUTH_CRYPTO_SIGNING_KEY:-LN8XN86ctkv1wtHMzU1BwXv5ZHjlgPKGe4l9etHpL1YRUwvtIU5FZCelDzSwQDBxFLRlisl6azYkH2xsz_UDQQ}
      CAS_AUTHN_MFA_GAUTH_CORE_SCRATCH_CODES_ENCRYPTION_KEY: ${CAS_AUTHN_MFA_GAUTH_CORE_SCRATCH_CODES_ENCRYPTION_KEY:-4/MqoE/ZbD3JtNQvc9Rfeg==}
      CAS_AUTHN_MFA_WEBAUTHN_CRYPTO_ENCRYPTION_KEY: ${CAS_AUTHN_MFA_WEBAUTHN_CRYPTO_ENCRYPTION_KEY:-e3ZAZ3V1C73QKQKUhNkwzF1iHliWceo9rYZL48DwDJkUcZMCVt8DARyBoV-K3Um_aL0W50LyBGCWSP8WmHdZRg}
      CAS_AUTHN_MFA_WEBAUTHN_CRYPTO_SIGNING_KEY: ${CAS_AUTHN_MFA_WEBAUTHN_CRYPTO_SIGNING_KEY:-Pnkwn54CFYmLteupjZjun3oLYakoO9Klfbbp4iVgjaDE4C8AQcTehrTvH2exQy8bWGTWC1MIE1I75hpkutNPCQ}
      CAS_AUTHN_MFA_TRUSTED_CRYPTO_ENCRYPTION_KEY: ${CAS_AUTHN_MFA_TRUSTED_CRYPTO_ENCRYPTION_KEY:-PbDcXokBSdIAFJWI5N7n6UvxgumPTmMOeixzcuJEA4ZChW33X52iJ72VY09YfWbTy86BB_fb9v-yCd1gAlJWLw}
      CAS_AUTHN_MFA_TRUSTED_CRYPTO_SIGNING_KEY: ${CAS_AUTHN_MFA_TRUSTED_CRYPTO_SIGNING_KEY:-M3wSdO6nK65EeqpNeDWADuKIWw3eBtoCCBoXBzqvblDEa2hm18B3eN_yHLoi_HEQWX3sBRzu1po9o5LFyK0Hew}
      CAS_ACCOUNT_REGISTRATION_ENCRYPTION_KEY: ${CAS_ACCOUNT_REGISTRATION_ENCRYPTION_KEY:-DNA2jvSd5CAYX/MkwxqqNGz0swc0ScOxRp0gSuqsS5g=}
      CAS_ACCOUNT_REGISTRATION_SIGNING_KEY: ${CAS_ACCOUNT_REGISTRATION_SIGNING_KEY:-MDBW//9v62frWBFJJqsszYHqCjCb83Tly37BZvmQMx0veNq6/8QpB28qsWuFSkSKipzWd561r96JQl+gq4Tz2A==}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-KoDWlYlAYohsEvYJJ3sjhVsiJYr6W7Azkv0JtGwY2Mo=}
      # Palantir 管理账号（密码必须是带 {bcrypt} 前缀的 bcrypt 哈希）
      CAS_ADMIN_USERNAME: ${CAS_ADMIN_USERNAME:-casuser}
      CAS_ADMIN_PASSWORD_BCRYPT: "{bcrypt}$2a$10$7uxCWhJGQ6./lKj9r6Z3M./uTv4iE0FQB.oVORaiqN9VdzY9kHZme"
      # Token 有效期配置
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-604800}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-31536000}
      # 小程序配置（生产环境请通过 .env 覆盖）
      WECHAT_APPID: ${WECHAT_APPID:-wx_dev_placeholder}
      WECHAT_SECRET: ${WECHAT_SECRET:-wechat_dev_placeholder_secret}
      DOUYIN_APPID: ${DOUYIN_APPID:-}
      DOUYIN_SECRET: ${DOUYIN_SECRET:-}
      ALIPAY_APPID: ${ALIPAY_APPID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      # 短信配置
      SMS_PROVIDER: ${SMS_PROVIDER:-aliyun}
      SMS_ACCESS_KEY: ${SMS_ACCESS_KEY:-}
      SMS_SECRET_KEY: ${SMS_SECRET_KEY:-}
      CAS_TOKEN_VALIDATION_SECRET: ${CAS_TOKEN_VALIDATION_SECRET:-Qo8XK0iRv7EGqRrjzlZHm5QTLQZuGPX2qAfeYvqbWa0=}
      # 日志级别（需要调试时改为 TRACE/DEBUG，无需重新打包）
      LOG_LEVEL_CAS: ${LOG_LEVEL_CAS:-INFO}
      LOG_LEVEL_BEENEST: ${LOG_LEVEL_BEENEST:-INFO}
      LOG_LEVEL_SPRING_SECURITY: ${LOG_LEVEL_SPRING_SECURITY:-INFO}
      LOG_LEVEL_SPRING_WEB: ${LOG_LEVEL_SPRING_WEB:-INFO}
      # JVM
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "8081:8081"
    volumes:
      - ./beenest-cas/beenest-cas-service/build/libs/cas.war:/app/app.war
      - ./beenest-cas/beenest-cas-service/etc/cas/oidc/jwks.json:/etc/cas/oidc/jwks.json:ro
      - ./beenest-cas/beenest-cas-service/etc/cas/saml:/etc/cas/saml
      - beenest-cas-logs:/app/logs
    working_dir: /app
    entrypoint: ["sh", "-c", "java $$JAVA_OPTS -jar /app/app.war"]
    networks:
      - beenest-net

  # ---------- 支付微服务（端口 8082） ----------
  beenest-payment:
    image: eclipse-temurin:21-jre-jammy
    container_name: beenest-payment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      PAYMENT_DB_URL: jdbc:postgresql://postgres:5432/beenest?currentSchema=beenest_payment
      PAYMENT_DB_USER: postgres
      PAYMENT_DB_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      NACOS_ADDR: nacos:8848
      # CAS Client（指向 beenest-cas）
      CAS_SERVER_URL: http://beenest-cas:8081/cas
      CAS_SIGN_KEY: ${CAS_SIGN_KEY:-I1yvbI6FJT6S+oj5dGK3dqUBGfqFenzcgWqctOWZuxI=}
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "8082:8082"
    volumes:
      - ./beenest-payment/beenest-payment-service/target/beenest-payment-service-0.0.1-SNAPSHOT.jar:/app/app.jar
      - beenest-payment-logs:/app/logs
    working_dir: /app
    entrypoint: ["sh", "-c", "java $$JAVA_OPTS -jar /app/app.jar"]
    networks:
      - beenest-net

networks:
  beenest-net:
    external: true

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  nacos-data:
  beenest-cas-logs:
  beenest-payment-logs:
