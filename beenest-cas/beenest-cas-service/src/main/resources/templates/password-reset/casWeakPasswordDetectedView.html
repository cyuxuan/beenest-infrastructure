<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title>Beenest SSO - 密码强度不足</title>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card cas-status-card">
      <div class="cas-status-icon cas-status-icon--warning">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.78 7.78 5.5 5.5 0 017.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
      </div>
      <h2>密码强度不足</h2>
      <p class="cas-status-text">
        您的密码不符合安全要求。密码需包含大写字母、小写字母、数字和特殊字符，且长度不少于 12 位。
      </p>
      <div class="cas-status-actions">
        <form method="post" id="fm1" style="display:inline">
          <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
          <input type="hidden" name="_eventId" value="continue"/>
          <button type="submit" class="cas-btn cas-btn-primary">修改密码</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
