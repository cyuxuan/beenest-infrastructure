<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title>Beenest SSO - 密码修改成功</title>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card cas-status-card">
      <div class="cas-status-icon cas-status-icon--success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4"/>
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </div>
      <h2>密码修改成功</h2>
      <p class="cas-status-text">您的密码已成功更新，请使用新密码重新登录。</p>
      <div class="cas-status-actions">
        <form method="post" id="proceedForm" th:action="@{/login}" style="display:inline">
          <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
          <input type="hidden" name="_eventId" value="proceed"/>
          <button type="submit" class="cas-btn cas-btn-primary">重新登录</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
