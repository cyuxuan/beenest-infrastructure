<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
  <title th:text="#{screen.authnblocked.heading}">Beenest SSO - 认证被阻止</title>
</head>

<body class="beenest-cas">
  <div layout:fragment="content">
    <div class="cas-page-card cas-status-card">
      <div class="cas-status-icon cas-status-icon--danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h2 th:utext="#{screen.authnblocked.heading}">认证被阻止</h2>
      <p class="cas-status-text" th:utext="#{screen.authnblocked.message}">您当前的认证请求未被授权。</p>
      <div class="cas-status-actions">
        <a th:href="@{/login}" class="cas-btn cas-btn-primary">返回登录</a>
      </div>
    </div>
  </div>
</body>

</html>
