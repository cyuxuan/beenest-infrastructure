<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>输入验证码</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card" style="text-align: center;">
            <h2 th:text="#{passwordless.token.header}">输入验证码</h2>
            <p th:text="#{passwordless.token.description}">请输入收到的验证码。</p>

            <div class="alert alert-danger" th:if="${error}">
                <strong th:text="#{passwordless.error.failure.title}">验证失败</strong>
                <p th:text="#{passwordless.error.failure.description}">请重试。</p>
            </div>

            <form method="post" id="fm1" th:action="@{/login}">
                <input type="hidden" name="_eventId_submit" value="LOGIN"/>
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>

                <section style="text-align: left; max-width: 24rem; margin: 1rem auto;">
                    <label for="token" th:utext="#{screen.welcome.label.token}">验证码</label>
                    <input type="text" id="token" name="token" autocomplete="one-time-code"
                           inputmode="numeric" placeholder="请输入验证码" required/>
                </section>

                <div class="cas-btn-group" style="justify-content: center;">
                    <button type="submit" class="cas-btn cas-btn-primary">验证并登录</button>
                    <a th:href="@{/login}" class="cas-btn cas-btn-outline">返回</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
