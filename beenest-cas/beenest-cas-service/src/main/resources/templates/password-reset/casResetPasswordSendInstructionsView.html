<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="zh-CN">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>重置密码</title>
</head>
<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content">
        <div class="cas-page-card">
            <h2>重置密码</h2>
            <p>输入用户名，我们将发送密码重置指令到你的邮箱或手机。</p>

            <form method="post" id="fm1" th:action="@{/login}">
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                <input type="hidden" name="_eventId" value="submit"/>

                <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
                    <span th:each="err : ${#fields.errors('*')}" th:utext="${err + ' '}"/>
                </div>

                <section>
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" autocomplete="username"
                           placeholder="请输入用户名" required/>
                </section>

                <div class="cas-btn-group" style="margin-top: 1.5rem;">
                    <button type="submit" class="cas-btn cas-btn-primary">发送重置指令</button>
                    <a th:href="@{/login}" class="cas-btn cas-btn-outline">返回登录</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
