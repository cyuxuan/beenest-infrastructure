# ============================================================
# CAS 测试环境本地兜底配置
# 测试环境差异化配置已迁移到 Nacos（data-id: beenest-cas-test.yml）
# 此文件仅在 Nacos 不可用时作为兜底。
# ============================================================

cas:
  server:
    name: ${CAS_SERVER_NAME:http://localhost:8081}
    prefix: ${cas.server.name}/cas
  tgc:
    secure: false

server:
  port: 8081
  ssl:
    enabled: false

spring:
  thymeleaf:
    cache: false

logging:
  level:
    org.apereo.cas: INFO
    org.apereo.cas.beenest: INFO
